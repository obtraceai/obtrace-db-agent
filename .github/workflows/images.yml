name: Build & Push Image

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: build-db-agent
  cancel-in-progress: true

env:
  REGISTRY: obtrace-registry.obtrace-infra.svc.cluster.local:5000

jobs:
  build-deploy:
    runs-on: obtrace-runners
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build and push
        env:
          DOCKER_HOST: tcp://localhost:2376
          DOCKER_TLS_VERIFY: "1"
          DOCKER_CERT_PATH: /certs/client
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build \
            -t ${REGISTRY}/db-agent:latest \
            -t ${REGISTRY}/db-agent:${SHORT_SHA} .
          docker push ${REGISTRY}/db-agent:latest
          docker push ${REGISTRY}/db-agent:${SHORT_SHA}

      - name: Restart deployment
        run: kubectl rollout restart deployment/obtrace-db-agent -n obtrace
